<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Uplands GPS Check</title>
  <style>
    :root {
      --ink: #121826;
      --muted: #667085;
      --accent: #d1228e;
      --border: #e5e7eb;
      --bg: #f8fafc;
      --card: rgba(255, 255, 255, 0.88);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(209,34,142,0.12), transparent 34%),
        radial-gradient(circle at top right, rgba(91,141,239,0.10), transparent 30%),
        var(--bg);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 560px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
      text-align: center;
      backdrop-filter: blur(18px);
    }
    img {
      max-width: 220px;
      width: 58%;
      height: auto;
      margin: 0 auto 18px;
      display: block;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }
    .status {
      margin-top: 22px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--border);
      font-weight: 600;
    }
    .status.error {
      color: #b42318;
      background: rgba(254, 242, 242, 0.92);
      border-color: rgba(254, 205, 211, 0.95);
    }
    .actions {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
    }
    .button.primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 10px 24px rgba(209, 34, 142, 0.26);
    }
    .button.secondary {
      background: white;
      color: var(--ink);
      border: 1px solid var(--border);
    }
    .small {
      margin-top: 18px;
      font-size: 0.92rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="./uplands-logo.png" alt="Uplands">
    <h1>Checking Site GPS</h1>
    <p>We need your location once to unlock the attendance register. If your browser asks, tap <strong>Allow</strong>.</p>
    <div id="status" class="status">Checking whether this browser already has location access...</div>
    <p id="diagnostic" class="small"></p>
    <div class="actions">
      <button id="request" class="button primary" type="button">Use Current Location</button>
      <button id="retry" class="button secondary" type="button">Retry GPS Access</button>
      <a id="back" class="button secondary" href="/">Back to Register</a>
    </div>
    <p class="small">iPhone tip: Safari > aA > Website Settings > Location > Allow.</p>
  </main>
  <script>
    (function () {
      const query = new URLSearchParams(window.location.search);
      const prefix = (query.get("prefix") || "geo").replace(/[^a-z0-9_]/gi, "") || "geo";
      const rawReturn = query.get("return") || "/?station=induction&mode=kiosk&kiosk_view=attendance";
      const siteName = (query.get("site_name") || "").trim();
      const siteLatitude = Number.parseFloat(query.get("site_lat") || "");
      const siteLongitude = Number.parseFloat(query.get("site_lng") || "");
      const siteRadiusMeters = Number.parseFloat(query.get("site_radius") || "");
      const sessionVerificationKey = "uplands_site_gate_geofence_v1";
      const sessionVerificationTtlMs = 8 * 60 * 60 * 1000;
      const logoBack = document.getElementById("back");
      const requestButton = document.getElementById("request");
      const status = document.getElementById("status");
      const retry = document.getElementById("retry");
      const diagnostic = document.getElementById("diagnostic");
      const userAgent = navigator.userAgent || "";
      const isIOSDevice =
        /iPhone|iPad|iPod/i.test(userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      function setDiagnostic(message) {
        diagnostic.textContent = message || "";
      }

      function isFiniteNumber(value) {
        return Number.isFinite(value);
      }

      function buildDeniedMessage() {
        if (!isIOSDevice) {
          return "Location access was not granted.";
        }
        return [
          "Safari is still blocking location for this site.",
          "Check Safari > aA > Website Settings > Location > Allow.",
          "If needed, also check iPhone Settings > Privacy & Security > Location Services > Safari Websites and make sure Precise Location is enabled.",
        ].join(" ");
      }

      function buildReturnUrl() {
        return new URL(rawReturn, window.location.origin);
      }

      function calculateDistanceMeters(latitudeA, longitudeA, latitudeB, longitudeB) {
        const toRadians = (degrees) => (degrees * Math.PI) / 180;
        const earthRadiusMeters = 6371000;
        const deltaLatitude = toRadians(latitudeB - latitudeA);
        const deltaLongitude = toRadians(longitudeB - longitudeA);
        const startLatitude = toRadians(latitudeA);
        const endLatitude = toRadians(latitudeB);
        const haversine =
          Math.sin(deltaLatitude / 2) * Math.sin(deltaLatitude / 2) +
          Math.cos(startLatitude) *
            Math.cos(endLatitude) *
            Math.sin(deltaLongitude / 2) *
            Math.sin(deltaLongitude / 2);
        const centralAngle = 2 * Math.atan2(Math.sqrt(haversine), Math.sqrt(1 - haversine));
        return earthRadiusMeters * centralAngle;
      }

      function loadCachedVerification() {
        if (!siteName || !isFiniteNumber(siteLatitude) || !isFiniteNumber(siteLongitude) || !isFiniteNumber(siteRadiusMeters)) {
          return null;
        }
        try {
          const rawPayload = window.sessionStorage.getItem(sessionVerificationKey);
          if (!rawPayload) {
            return null;
          }
          const payload = JSON.parse(rawPayload);
          const verifiedAt = Number(payload.verifiedAt || 0);
          if (!verifiedAt || (Date.now() - verifiedAt) > sessionVerificationTtlMs) {
            window.sessionStorage.removeItem(sessionVerificationKey);
            return null;
          }
          if (String(payload.siteName || "").trim().toLowerCase() !== siteName.toLowerCase()) {
            return null;
          }
          const cachedLatitude = Number(payload.latitude);
          const cachedLongitude = Number(payload.longitude);
          const cachedAccuracy = isFiniteNumber(Number(payload.accuracy))
            ? Number(payload.accuracy)
            : null;
          if (!isFiniteNumber(cachedLatitude) || !isFiniteNumber(cachedLongitude)) {
            return null;
          }
          const cachedDistance = calculateDistanceMeters(
            cachedLatitude,
            cachedLongitude,
            siteLatitude,
            siteLongitude
          );
          if (cachedDistance > siteRadiusMeters) {
            return null;
          }
          return {
            coords: {
              latitude: cachedLatitude,
              longitude: cachedLongitude,
              accuracy: cachedAccuracy,
            },
          };
        } catch (error) {
          return null;
        }
      }

      function saveCachedVerification(position) {
        if (!siteName || !isFiniteNumber(siteLatitude) || !isFiniteNumber(siteLongitude) || !isFiniteNumber(siteRadiusMeters)) {
          return;
        }
        try {
          window.sessionStorage.setItem(
            sessionVerificationKey,
            JSON.stringify({
              siteName: siteName,
              latitude: position.coords.latitude,
              longitude: position.coords.longitude,
              accuracy:
                position.coords.accuracy !== undefined && position.coords.accuracy !== null
                  ? position.coords.accuracy
                  : null,
              verifiedAt: Date.now(),
            })
          );
        } catch (error) {
          // Best effort only. The gate still works without browser storage.
        }
      }

      async function getPermissionState() {
        if (!navigator.permissions || !navigator.permissions.query) {
          return "unknown";
        }
        try {
          const permissionStatus = await navigator.permissions.query({ name: "geolocation" });
          return permissionStatus.state || "unknown";
        } catch (error) {
          return "unknown";
        }
      }

      function redirectWithError(message) {
        const url = buildReturnUrl();
        url.searchParams.delete(prefix + "_lat");
        url.searchParams.delete(prefix + "_lng");
        url.searchParams.delete(prefix + "_acc");
        url.searchParams.delete(prefix + "_source");
        url.searchParams.set(prefix + "_error", message || "Location access was not granted.");
        window.location.replace(url.toString());
      }

      function redirectWithPosition(position, source) {
        const url = buildReturnUrl();
        url.searchParams.delete(prefix + "_error");
        url.searchParams.set(prefix + "_lat", String(position.coords.latitude));
        url.searchParams.set(prefix + "_lng", String(position.coords.longitude));
        url.searchParams.set(prefix + "_source", source || "gps");
        if (position.coords.accuracy !== undefined && position.coords.accuracy !== null) {
          url.searchParams.set(prefix + "_acc", String(position.coords.accuracy));
        } else {
          url.searchParams.delete(prefix + "_acc");
        }
        window.location.replace(url.toString());
      }

      function tryWatchPositionFallback() {
        if (!navigator.geolocation || !navigator.geolocation.watchPosition) {
          return;
        }
        let watchId = null;
        watchId = navigator.geolocation.watchPosition(
          function (position) {
            if (watchId !== null) {
              navigator.geolocation.clearWatch(watchId);
            }
            status.textContent = "GPS captured. Returning to the register...";
            saveCachedVerification(position);
            redirectWithPosition(position, "gps");
          },
          function () {
            if (watchId !== null) {
              navigator.geolocation.clearWatch(watchId);
            }
          },
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      }

      function requestLocation(manualRequest) {
        status.className = "status";
        status.textContent = manualRequest
          ? "Requesting location access..."
          : "Checking whether location is already allowed...";
        setDiagnostic(window.isSecureContext ? "Secure connection confirmed." : "This page is not running in a secure context.");
        if (!navigator.geolocation) {
          status.className = "status error";
          status.textContent = "This browser does not support location services.";
          redirectWithError("This browser does not support location services.");
          return;
        }

        navigator.geolocation.getCurrentPosition(
          function (position) {
            status.textContent = "GPS captured. Returning to the register...";
            saveCachedVerification(position);
            redirectWithPosition(position, "gps");
          },
          function (error) {
            if (error && error.code === 3 && manualRequest) {
              status.textContent = "Trying a slower GPS fallback...";
              tryWatchPositionFallback();
              return;
            }
            const message =
              error && error.code === 1
                ? buildDeniedMessage()
                : error && error.message
                  ? error.message
                  : "Location access was not granted.";
            if (manualRequest) {
              status.className = "status error";
              status.textContent = message;
              return;
            }
            status.className = "status";
            status.textContent = "Tap Use Current Location to continue. If Safari asks, choose Allow.";
          },
          {
            enableHighAccuracy: !isIOSDevice,
            timeout: isIOSDevice ? 12000 : 20000,
            maximumAge: isIOSDevice ? 60000 : 0,
          }
        );
      }

      async function bootstrap() {
        logoBack.href = buildReturnUrl().toString();
        const cachedVerification = loadCachedVerification();
        if (cachedVerification) {
          status.textContent = "Using the last on-site check from this browser session...";
          redirectWithPosition(cachedVerification, "trusted_device");
          return;
        }
        setDiagnostic(window.isSecureContext ? "Secure connection confirmed." : "This page is not running in a secure context.");
        const permissionState = await getPermissionState();
        if (permissionState && permissionState !== "unknown") {
          setDiagnostic(
            (window.isSecureContext ? "Secure connection confirmed." : "This page is not running in a secure context.")
            + " Location permission: " + permissionState + "."
          );
        }
        if (permissionState === "granted") {
          requestLocation(false);
          return;
        }
        if (permissionState === "denied") {
          status.className = "status error";
          status.textContent = buildDeniedMessage();
          return;
        }
        if (isIOSDevice) {
          status.textContent = "Tap Use Current Location once. If Safari asks, choose Allow.";
          return;
        }
        status.textContent = "Tap Use Current Location to continue.";
      }

      requestButton.addEventListener("click", function () { requestLocation(true); });
      retry.addEventListener("click", function () { requestLocation(true); });
      bootstrap();
    })();
  </script>
</body>
</html>
